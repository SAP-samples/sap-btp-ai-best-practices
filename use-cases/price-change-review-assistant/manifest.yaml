---
applications:
  - name: email-price-classifier-api
    path: api
    buildpack: python_buildpack
    command: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    memory: 512M
    routes:
      - route: email-price-classifier-api.cfapps.eu10-005.hana.ondemand.com
    services:
      - "email-price-classifier-destination"
    env:
      ALLOWED_ORIGIN: https://((ui_host))
      API_BASE_URL: ((api_route))
      APP_ENV: production
      API_KEY: ((api_key))
      FETCH_MAX_DAYS: ((fetch_max_days))
      GMAIL_MAILBOX_ID: me
      GMAIL_DESTINATION_NAME: GMAIL_API_READONLY
      GMAIL_DESTINATION_LEVEL: subaccount
      GMAIL_REFRESH_TOKEN_PROPERTY: GMAIL_REFRESH_TOKEN
      DESTINATION_SERVICE_NAME: "email-price-classifier-destination"
      PRICE_CHANGE_EXTRACTOR_MODEL: gpt-4o-mini
      PRICE_CHANGE_ATTACHMENT_EXTRACTOR_MODEL: gpt-5.4
      PRICE_CHANGE_AGENT_MODEL: gpt-5.4
      PRICE_CHANGE_AGENT_REASONING_EFFORT: low
  - name: email-price-classifier-ui
    path: ui
    buildpack: nodejs_buildpack
    command: npx vite preview --host 0.0.0.0 --port $PORT
    memory: 256M
    routes:
      - route: email-price-classifier.cfapps.eu10-005.hana.ondemand.com
    env:
      VITE_API_BASE_URL: ((api_route))
      VITE_APP_HOST: ((ui_host))
      VITE_API_KEY: ((api_key))
