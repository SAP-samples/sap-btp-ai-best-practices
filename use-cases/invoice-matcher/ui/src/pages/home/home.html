<div class="home-page">
  <ui5-title level="H2">Invoice · Payment Matcher</ui5-title>
  <ui5-text class="home-description">
    AI-powered matching of bank payments to customer invoices.
  </ui5-text>

  <div class="home-cards">
    <ui5-card>
      <ui5-card-header slot="header" title-text="Get Started" subtitle-text="Upload CSV files and run matching"></ui5-card-header>
      <div class="card-content">
        <ui5-text>Upload invoice and payment CSV files, then run rule-based matching followed by AI-powered name matching for unresolved entries.</ui5-text>
        <ui5-button design="Emphasized" onclick="pageRouter.navigate('/invoice-matcher')" style="margin-top: 1rem;">
          Open Matcher
        </ui5-button>
      </div>
    </ui5-card>
  </div>
</div>
