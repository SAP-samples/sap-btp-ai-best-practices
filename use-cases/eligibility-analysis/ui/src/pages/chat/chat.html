<div class="chat-container">
  <ui5-title>Generative AI Chat</ui5-title>

  <div style="margin-top: 1rem">
    <ui5-label for="model-select" required>Select a model</ui5-label>
    <ui5-select id="model-select" style="width: 100%">
      <ui5-option value="anthropic">Anthropic Claude Sonnet</ui5-option>
      <ui5-option value="openai">OpenAI GPT-4.1</ui5-option>
      <ui5-option value="gemini" selected>Google Gemini 2.5 Flash</ui5-option>
    </ui5-select>
  </div>
  <div style="margin-top: 1rem">
    <ui5-label for="prompt-input" required>Enter your prompt</ui5-label>
    <ui5-textarea id="prompt-input" style="width: 100%" rows="8" placeholder="e.g., Explain quantum computing in simple terms"></ui5-textarea>
  </div>
  <ui5-button id="send-button" design="Emphasized" style="margin-top: 1rem">Send Request</ui5-button>

  <ui5-panel id="response-panel" header-text="Response" collapsed style="margin-top: 2rem">
    <div id="response-container" style="padding: 1rem; white-space: pre-wrap; min-height: 50px"></div>
  </ui5-panel>
</div>
