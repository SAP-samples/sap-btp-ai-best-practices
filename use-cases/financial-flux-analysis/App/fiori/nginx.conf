worker_processes 1;
daemon off;

error_log stderr;
events { worker_connections 1024; }

http {
    charset utf-8;
    log_format cloudfoundry 'NginxLog "$request" $status $body_bytes_sent';
    access_log /dev/stdout cloudfoundry;
    default_type application/octet-stream;
    include mime.types;
    sendfile on;

    tcp_nopush on;
    keepalive_timeout 30;
    port_in_redirect off;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;

    server {
        listen 8080;
        root /home/vcap/app;
        index index.html index.htm;

        # SPA fallback — serve index.html for all non-file requests
        location / {
            try_files $uri $uri/ /index.html;
        }

        # No-cache headers for UI5 app files (applied AFTER file is found)
        location ~* \.(html|js|xml|json)$ {
            root /home/vcap/app;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            try_files $uri =404;
        }

        # Long-lived cache for content-hashed assets
        location ~* \.(css|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
            root /home/vcap/app;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Deny hidden files
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}